name: Publish Allure (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install deps
        run: |
          poetry install --with dev

      - name: Install Playwright Chromium
        run: |
          poetry run playwright install --with-deps chromium

      - name: Run tests + collect Allure results
        env:
          HEADLESS: "1"
        run: |
          mkdir -p reports/allure-results
          poetry run pytest -v --html=reports/report.html --self-contained-html --alluredir=reports/allure-results

      - name: Build Allure HTML report
        run: |
          npm i -g allure-commandline --silent
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Build Pages site
        run: |
          mkdir -p site
          cp -R reports/allure-report site/allure
          cp reports/report.html site/report.html
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>QA Portfolio Reports</title>
              <style>
                :root { color-scheme: light; }
                body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 32px; max-width: 920px; margin: 0 auto; }
                h1 { margin: 0 0 12px; }
                p { margin: 0 0 24px; }
                a { display: inline-block; margin-right: 16px; }
                code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
              </style>
            </head>
            <body>
              <h1>QA Portfolio Reports</h1>
              <p>Generated by GitHub Actions from <code>main</code>.</p>
              <p>
                <a href="./allure/">Allure dashboard</a>
                <a href="./report.html">pytest-html report</a>
              </p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
